# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  color: sagepeak
  custom_css: ["css/custom.scss"]

# Site metadata
title: "Liam W. Hart"
subtitle: "Psychology PhD Student | Adult Development & Aging"

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: ''
    description: 'The highly-customizable Hugo Academic theme powered by Hugo Blox Builder. Easily create your personal academic website.'
    twitter: 'GetResearchDev'
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: 'google474b48e0ca708f03'
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    blox: "navbar"
    fixed_to_top: true
    show_search: true
    show_theme_chooser: true
    logo:
      text: "Liam W. Hart"
    show_theme_chooser: true
    show_search: true
    highlight_active_link: true

# Site footer
footer:
  copyright:
    notice: '© {year} Me. This work is licensed under {license}'
    license:
      enable: true
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# Hero section for homepage
hero:
  enable: true
  image: img/banner.jpg  # Place your image in /static/img/banner.jpg
  overlay_color: "#2A5D4D"  # Optional: matches your sagepeak green
  overlay_opacity: 0.4
  height: "50vh"
  content: 
    title: "Liam W. Hart"
    subtitle: "Psychology PhD Student | Adult Development & Aging"
    align: center

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# Site features
features:
  math:
    enable: false
  privacy_pack:
    enable: false
